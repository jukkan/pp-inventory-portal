appearance:
  default: dark
  switcher: false

title: PP Inventory Portal
description: Power Platform governance · UDPP26 GOV-03

theme:
  colorPalettes:
    default:
      dark:
        - "#6366f1"
        - "#818cf8"
        - "#a78bfa"
        - "#c4b5fd"
        - "#60a5fa"
        - "#34d399"
        - "#fbbf24"
        - "#f87171"
        - "#fb923c"
        - "#38bdf8"
  colorScales:
    default:
      dark:
        - "#1e293b"
        - "#6366f1"
  colors:
    primary: "#6366f1"
    accent: "#a78bfa"
    base: "#09090b"
    info: "#38bdf8"
    positive: "#4ade80"
    warning: "#fbbf24"
    negative: "#f87171"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
    "evidence-connector-fabric": { }
